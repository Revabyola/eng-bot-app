<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>English Bot</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🇬🇧 English Bot</h1>
            <div id="user-info"></div>
        </div>
        
        <div class="content" id="content">
            <div class="loading">Загрузка...</div>
        </div>
        
        <div class="bottom-nav">
            <button class="nav-btn active" data-page="dictionary">Словарь</button>
            <button class="nav-btn" data-page="add">Добавить</button>
            <button class="nav-btn" data-page="test">Тест</button>
            <button class="nav-btn" data-page="stats">Статистика</button>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
